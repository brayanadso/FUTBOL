{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Equipos</title>
    <link rel="stylesheet" href="{% static 'equipos/css/style.css' %}">
</head>

<body>
    <nav>
        <h1>F  P  C</h1>
        <div>
            <a href="/" class="btn btn-equipos">Home</a>
            <a href="/equipos/" class="btn btn-equipos">Equipos</a>
           <a href="/jugadores/" class="btn btn-equipos">Jugadores</a>
        </div>
    </nav>

    <h2>Liga de Equipos</h2>

    <div class="equipos-container">
        {% for equipo in equipos %}
        <div class="equipo-card">
            {% if equipo.escudo %}
                <img src="{{ equipo.escudo.url }}" alt="{{ equipo.nombre }}">
            {% endif %}
            <h3>{{ equipo.nombre }}</h3>
            <p>🏙️ {{ equipo.ciudad }}</p>
            <p>👨‍💼 {{ equipo.director_tecnico }}</p>
            <span>🏆 {{ equipo.trofeos_ganados }} trofeos</span>
             <a href="/equipos/{{ equipo.id }}/" class="btn-detalle">Ver Equipo →</a>
        </div>
        {% endfor %}
    </div>
</body>
</html>
